      Core module extraction, JSON Schema validation, telemetry,
      pre-commit hooks, pyproject.toml packaging.
    manifest_changes:
      added_fields:
        - path: "provider.agents"
          description: "Per-agent provider overrides (optional, Phase 3)"
          default: null
    files_changed:
      - opencode.json
      - .opencode/_shared.md
      - .opencode/agents/*
      - .opencode/commands/*
      - .opencode/evals/*
      - .opencode/skills/*
    migration_steps:
      - action: rerun_apply
        description: >
          curl -sL https://raw.githubusercontent.com/aequicor/opencode-kit/main/scripts/apply_remote.py -o apply_remote.py
          python3 apply_remote.py --manifest <manifest>.yaml --target . --merge
          rm apply_remote.py
      - action: validate_manifest
        description: >
          python3 -c "from scripts.core.schema import validate_manifest; validate_manifest('manifest.yaml')"
    new_capabilities:
      - "HITL gates for destructive operations"
      - "Schema validation for manifests"
      - "Telemetry tracking"
      - "4 new profiles: rust-actix, go-gin, java-spring, csharp-aspnet"

