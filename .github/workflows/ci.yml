name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml pytest pytest-cov

      - name: Run unit tests
        run: python -m pytest tests/test_apply.py -v --tb=short

      - name: Run integration tests
        run: python -m pytest tests/test_integration.py -v --tb=short

      - name: Coverage report
        run: python -m pytest tests/ --cov=scripts --cov-report=term -v
        if: matrix.python-version == '3.12'

      - name: Run eval suites (dry)
        run: python scripts/run_evals.py --suites kit/.opencode/evals --output /tmp/eval-output
        if: matrix.python-version == '3.12'

  validate-manifests:
    name: Validate manifests and profiles
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Validate manifest.example.yaml
        run: |
          python -c "
          import yaml, sys, json
          from pathlib import Path

          with open('manifest.example.yaml') as f:
              m = yaml.safe_load(f)
          assert 'project' in m
          assert 'stack' in m
          assert 'kit_version' in m
          assert 'editors' in m
          print('manifest.example.yaml: OK')

          if Path('kit/manifest.schema.json').exists():
              from jsonschema import validate as jsonvalidate
              with open('kit/manifest.schema.json') as sf:
                  schema = json.load(sf)
              jsonvalidate(m, schema)
              print('manifest.example.yaml: schema validation OK')
          "

      - name: Validate all profile YAMLs
        run: |
          python -c "
          import yaml, sys
          from pathlib import Path
          for p in Path('profiles').glob('*.yaml'):
              with open(p) as f:
                  data = yaml.safe_load(f)
              print(f'{p.name}: OK')
          print(f'Total profiles: {len(list(Path(\"profiles\").glob(\"*.yaml\")))}')
          "

      - name: Dry-run apply with example manifest
        run: |
          mkdir -p /tmp/test-project
          python scripts/apply.py \
            --manifest manifest.example.yaml \
            --target /tmp/test-project \
            --dry-run

      - name: Check CHANGELOG exists
        run: |
          test -f CHANGELOG.md && echo "CHANGELOG: OK" || echo "CHANGELOG: MISSING"
          test -f pyproject.toml && echo "pyproject.toml: OK" || echo "pyproject.toml: MISSING"
          test -f .pre-commit-config.yaml && echo "pre-commit: OK" || echo "pre-commit: MISSING"

  lint:
    name: Lint Python scripts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint scripts/ and tests/
        run: ruff check scripts/ tests/ --select E,W,F --ignore E501

      - name: Check formatting
        run: ruff format --check scripts/ tests/
