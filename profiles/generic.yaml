# opencode-kit profile: Generic (language-agnostic baseline)
# Usage: add generic to stack.profiles in your manifest
# Minimal configuration — no LSP, no serena, no Designer agent.

_profile_name: generic
_profile_description: "Language-agnostic baseline — no LSP, no serena, no Designer"
_profile_category: stack

stack:
  language: generic
  build_command: "make"
  compile_command: "make check"
  lint_command: "make lint"
  test_command: "make test"

lsp:
  enabled: false
  command: ""
  extensions: []

formatter:
  enabled: false
  name: "default-fmt"
  command: ["make", "format"]
  extensions: []

code_quality:
  forbidden_patterns:
    - "Hardcoded secrets or API keys in code"
    - "SQL string concatenation with user input"
    - "Logging sensitive data (passwords, tokens, PII)"
    - "TODO comments without tracking entry"

mcp:
  context7:
    enabled: true
    api_key_env: CONTEXT7_API_KEY
  knowledge:
    enabled: false
  serena:
    enabled: false