# opencode-kit profile: Rust / Actix Web
# Usage: set stack.profile: rust-actix in your manifest

_profile_name: rust-actix
_profile_description: "Rust (stable) + Actix Web with Clippy, rustfmt, and cargo test"
_profile_category: stack

stack:
  language: rust
  build_command: "cargo build"
  compile_command: "cargo check"
  lint_command: "cargo clippy -- -D warnings"
  test_command: "cargo test --package [module]"

lsp:
  enabled: true
  command: "rust-analyzer"
  extensions: [".rs"]

formatter:
  enabled: true
  name: "rustfmt"
  command: ["rustfmt", "--edition", "2021"]
  extensions: [".rs"]

code_quality:
  forbidden_patterns:
    - ".unwrap() in production code (use proper error handling with Result)"
    - "unsafe { } without documented safety invariants"
    - "panic!() in library code (return Result with error)"
    - "Clone unnecessarily — prefer borrow or Arc for shared access"
    - "Blocking I/O inside async context (use tokio::task::spawn_blocking)"
    - "println! in production code (use tracing/log crate)"
    - "TODO() in production code without DECISIONS.md entry"
    - "Hardcoded secrets or credentials in any file"
    - "Raw SQL string interpolation (use parameterized queries via sqlx/diesel)"

mcp:
  context7:
    enabled: true
    api_key_env: CONTEXT7_API_KEY
  knowledge:
    enabled: false
  serena:
    enabled: false
