# Profile: Kotlin Multiplatform
# Pre-filled for KMP projects: Compose Desktop + Android + iOS + Ktor backends
# Copy this to my-project.yaml and fill in the project-specific sections.

project:
  name: "My KMP Project"
  description: "Kotlin Multiplatform app with Compose UI and Ktor backend"

stack:
  language: kotlin
  profile: kotlin-multiplatform
  build_command: "./gradlew"
  compile_command: "./gradlew compileKotlin"
  lint_command: "./gradlew detekt ktlintCheck"
  test_command: "./gradlew :[module]:test"

# Fill in your actual modules:
modules:
  - name: server
    gradle_module: ":server"
    source_root: "server/src/main/kotlin/com/example/"
    test_root: "server/src/test/kotlin/com/example/"
    docs_path: "docs/server/"
    responsibility: "Ktor server, API, business logic"

  - name: client
    gradle_module: ":composeApp"
    source_root: "composeApp/src/commonMain/kotlin/com/example/"
    test_root: "composeApp/src/commonTest/kotlin/com/example/"
    docs_path: "docs/client/"
    responsibility: "Compose Multiplatform client, UI, session"

  - name: shared
    gradle_module: ":shared"
    source_root: "shared/src/commonMain/kotlin/com/example/"
    test_root: "shared/src/commonTest/kotlin/com/example/"
    docs_path: "docs/shared/"
    responsibility: "Shared domain logic, models, utilities"

provider:
  name: routerai
  base_url: https://routerai.ru/api/v1
  api_key_env: ROUTERAI_OPENCODE

models:
  default: moonshotai/kimi-k2.6
  coder: qwen/qwen3-coder-next
  reviewer: deepseek/deepseek-v4-pro
  designer: openai/gpt-5.4

mcp:
  context7:
    enabled: true
    api_key_env: CONTEXT7_API_KEY
  knowledge:
    enabled: true
    url: http://localhost:8085/mcp
  serena:
    enabled: true

lsp:
  enabled: true
  command: kotlin-lsp
  extensions: [".kt", ".kts"]

ui:
  framework: "Compose Multiplatform"
  platforms: ["Desktop", "Android", "iOS"]
  colors:
    - name: "Primary Background"
      hex: "#REPLACE_ME"
      purpose: "Main background color"
    - name: "Primary Accent"
      hex: "#REPLACE_ME"
      purpose: "CTA buttons, highlights"
    - name: "Primary Text"
      hex: "#FFFFFF"
      purpose: "Main text on dark background"
    - name: "Secondary Text"
      hex: "#9BA0AB"
      purpose: "Labels, hints"

code_quality:
  forbidden_patterns:
    - "!! operator (use requireNotNull/checkNotNull with message)"
    - "GlobalScope.launch (always use a scoped coroutine)"
    - "Thread.sleep in suspend code (use delay())"
    - "Empty catch blocks"
    - "Bare Exception/Throwable catch (catch specific types)"
    - "lateinit outside DI containers, fragments, and tests"
    - "runBlocking outside main and tests"
    - "TODO() in production code without DECISIONS.md entry"
    - "Raw SQL string concatenation (use Exposed parameterized queries)"
    - "Logging tokens, passwords, PII data"
