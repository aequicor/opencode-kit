# opencode-kit profile: Ollama Cloud
# Usage: add ollama-cloud to stack.profiles in your manifest
# Overrides provider and models for Ollama's cloud-hosted LLMs.

_profile_name: ollama-cloud
_profile_description: "Ollama cloud-hosted LLMs via OpenAI-compatible API"
_profile_category: provider

provider:
  name: ollama-cloud
  base_url: https://api.ollama.com/v1
  api_key_env: OLLAMA_CLOUD_API_KEY

models:
  default: kimi-k2.6
  coder: qwen3-coder-next
  reviewer: deepseek-v4-pro
  designer: null
  small: deepseek-v4-flash

lsp:
  enabled: false
  command: ""
  extensions: []

formatter:
  enabled: false
  name: "default-fmt"
  command: ["make", "format"]
  extensions: []

code_quality:
  forbidden_patterns:
    - "Hardcoded secrets or API keys in code"
    - "SQL string concatenation with user input"
    - "Logging sensitive data (passwords, tokens, PII)"
    - "TODO comments without tracking entry"

mcp:
  context7:
    enabled: true
    api_key_env: CONTEXT7_API_KEY
  knowledge:
    enabled: false
  serena:
    enabled: false