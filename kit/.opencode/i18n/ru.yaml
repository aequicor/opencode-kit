## Использование

Для переключения на русский язык добавьте в `opencode.json`:

```json
"environment": {
  "OPPENCODE_LANG": "ru"
}
```

Агенты проверяют `OPPENCODE_LANG` и подгружают соответствующие локализованные варианты сообщений через `.opencode/_shared.md`.
