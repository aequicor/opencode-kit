# opencode-kit manifest — Ollama Cloud edition
# Fill this file for your project, then run:
#   python3 scripts/apply.py --manifest my-project.yaml --target /path/to/project
#
# Prerequisites:
#   1. Sign in at https://ollama.com → Settings → Keys → Add API Key
#   2. export OLLAMA_CLOUD_API_KEY=<your_api_key>
#   3. ollama pull kimi-k2.6          # for orchestrator
#      ollama pull qwen3-coder-next   # for coding agents
#      ollama pull deepseek-v4-pro    # for review agents
#      ollama pull deepseek-v4-flash  # for small/title tasks

# ─────────────────────────────────────────────
# PROJECT
# ─────────────────────────────────────────────
project:
  name: "My Project"
  description: "Brief one-line description of the project"

# ─────────────────────────────────────────────
# STACK
# ─────────────────────────────────────────────
stack:
  language: generic                        # kotlin | python | typescript | go | generic
  profile: ollama-cloud                    # which profile from profiles/ to use as base

  # Build commands — used in AGENTS.md and agent prompts
  build_command: "make"                    # or npm run build, cargo build, etc.
  compile_command: "make check"            # or tsc --noEmit, mypy ., etc.
  lint_command: "make lint"                # or eslint ., flake8 ., etc.
  test_command: "make test"                # or pytest, jest, cargo test, etc.

# ─────────────────────────────────────────────
# MODULES
# ─────────────────────────────────────────────
# Each module produces one row in the module table in _shared.md and FILE_STRUCTURE.md.
# It also creates the docs/<module>/ directory scaffold.
modules:
  - name: backend
    gradle_module: null                    # null if not using Gradle
    source_root: "src/"
    test_root: "tests/"
    docs_path: "docs/backend/"
    responsibility: "Backend API, business logic"

  - name: frontend
    gradle_module: null
    source_root: "frontend/src/"
    test_root: "frontend/tests/"
    docs_path: "docs/frontend/"
    responsibility: "Frontend UI, client logic"

  # Add more modules as needed:
  # - name: payments
  #   gradle_module: null
  #   source_root: "payments/src/"
  #   test_root: "payments/tests/"
  #   docs_path: "docs/payments/"
  #   responsibility: "Payment processing, billing"

# ─────────────────────────────────────────────
# PROVIDER
# ─────────────────────────────────────────────
provider:
  name: ollama-cloud                       # Provider display name (used in opencode.json)
  base_url: https://api.ollama.com/v1     # Ollama Cloud OpenAI-compatible endpoint
  api_key_env: OLLAMA_CLOUD_API_KEY        # Env var holding your Ollama Cloud API key

# ─────────────────────────────────────────────
# MODELS
# ─────────────────────────────────────────────
# Ollama Cloud models available (ollama.com/search):
#   Orchestrator: kimi-k2.6, glm-5.1, qwen3.6, deepseek-v4-pro
#   Coder: qwen3-coder-next, qwen3.6, deepseek-v4-flash
#   Reviewer: deepseek-v4-pro, kimi-k2.6, mistral-medium-3.5
#   Designer: gemma4 (has vision), qwen3.6 (has vision)
models:
  default: kimi-k2.6                       # Orchestrator (@Main) — best reasoning/SWE
  coder: qwen3-coder-next                  # @CodeWriter, @BugFixer, @debugger, @QA
  reviewer: deepseek-v4-pro                # @CodeReviewer, @PromptEngineer
  designer: null                           # set to e.g. gemma4 for UI (vision-capable)
  small: deepseek-v4-flash                 # Lightweight model for title/summary tasks

# ─────────────────────────────────────────────
# MCP INTEGRATIONS
# ─────────────────────────────────────────────
mcp:
  context7:
    enabled: true                          # External library documentation (rate-limited)
    api_key_env: CONTEXT7_API_KEY

  knowledge:
    enabled: false                         # Set to true if running KnowledgeOS
    url: http://localhost:8085/mcp

  serena:
    enabled: false                         # serena is JVM-focused — disable for non-JVM projects

# ─────────────────────────────────────────────
# LSP
# ─────────────────────────────────────────────
lsp:
  enabled: false                           # Set to true with appropriate LSP for your language
  command: ""
  extensions: []

# ─────────────────────────────────────────────
# UI (optional — omit or set framework: null to skip Designer agent)
# ─────────────────────────────────────────────
ui:
  framework: null                          # Set to your UI framework to enable @Designer
  platforms: []
  colors: []

# ─────────────────────────────────────────────
# CODE QUALITY
# ─────────────────────────────────────────────
code_quality:
  forbidden_patterns:
    - "Hardcoded secrets or API keys in code"
    - "SQL string concatenation with user input"
    - "Logging sensitive data (passwords, tokens, PII)"
    - "TODO comments without tracking entry"

# ─────────────────────────────────────────────
# FORMATTER (optional)
# ─────────────────────────────────────────────
formatter:
  enabled: false                           # Enable and configure for your language
  name: "default-fmt"
  command: ["make", "format"]
  extensions: []
